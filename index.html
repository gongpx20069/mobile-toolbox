<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Toolbox</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(16, 30, 52, 0.82);
        --text: #eef5ff;
        --muted: #91a4c3;
        --border: rgba(148, 163, 184, 0.22);
        --blue: #54a3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(84, 163, 255, 0.18), transparent 30rem),
          linear-gradient(140deg, #07111f 0%, #0b1730 52%, #07111f 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: max(24px, env(safe-area-inset-top)) 18px max(32px, env(safe-area-inset-bottom));
      }

      .hero,
      .app-card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(18px);
      }

      .hero {
        padding: 22px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--blue);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(2rem, 8vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      .subtle {
        margin-bottom: 0;
        color: var(--muted);
      }

      .apps {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      .app-card {
        display: grid;
        gap: 12px;
        padding: 18px;
        color: inherit;
        text-decoration: none;
      }

      .app-card h2 {
        margin-bottom: 0;
      }

      .app-card span {
        color: var(--blue);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Mobile Toolbox</p>
        <h1>手机工具箱</h1>
        <p class="subtle">用于放置适合手机使用的小工具和看板。</p>
      </section>

      <section class="apps" aria-label="应用列表">
        <a class="app-card" href="apps/stock-portfolio/">
          <h2>美股持仓看板</h2>
          <p class="subtle">横屏常亮展示持仓、市值、盈亏和日内变动。</p>
          <span>打开</span>
        </a>
      </section>
    </main>
  </body>
</html>
